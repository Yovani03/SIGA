version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: autotran-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin_secure_password
      POSTGRES_DB: autotran_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autotran-backend
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:admin_secure_password@db:5432/autotran_db
      - DATABASE_SSL_REQUIRE=False
      - SECRET_KEY=django-insecure-autotran-production-secret-key-2026
      - DEBUG=False
      - DJANGO_ALLOWED_HOSTS=siga-discovery.duckdns.org,localhost,127.0.0.1
      - CSRF_TRUSTED_ORIGINS=https://siga-discovery.duckdns.org
      - CORS_ALLOWED_ORIGINS=https://siga-discovery.duckdns.org
    volumes:
      - ./backend/media:/app/media
      - ./backend/staticfiles:/app/staticfiles
      - "./formato bitacora:/formato bitacora:ro"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autotran-frontend
    restart: always
    ports:
      - "8090:80"
    depends_on:
      - backend
    volumes:
      - ./backend/media:/app/media:ro
      - ./backend/staticfiles:/app/staticfiles:ro
    networks:
      # Red interna del proyecto (para hablar con el backend)
      - default
      # Red de Nginx Proxy Manager (para exponer el dominio con SSL)
      - npm

volumes:
  db_data:

networks:
  # Red existente de Nginx Proxy Manager, se une como externa.
  npm:
    external: true
    name: nginx-proxy-manager_default
